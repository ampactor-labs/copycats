name: ci
on:
  push:
    paths-ignore: ['**.md']
  pull_request:
    paths-ignore: ['**.md']
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Godot 4.7
        run: |
          curl -sSL -o godot.zip https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q godot.zip
          chmod +x Godot_v4.7-stable_linux.x86_64
      - name: Test gate (sim + flow + fuzz)
        run: GODOT="$PWD/Godot_v4.7-stable_linux.x86_64" FUZZ=50 bash game/test.sh
